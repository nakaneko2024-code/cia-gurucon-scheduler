<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIA 夜グルコン スケジュール入力</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-theme:   #cbe3ff;
      --color-accent1: #fff9b0;
      --color-accent2: #3995a3;
      --color-text:    #2a2a2a;
      --color-muted:   #6b7280;
      --color-white:   #ffffff;
      --color-bg:      #f0f6ff;
      --color-border:  #d1e8ff;
      --radius-card:   16px;
      --radius-btn:    10px;
      --radius-bubble: 0 14px 14px 14px;
      --font-main: 'Shippori Mincho', 'Hiragino Mincho ProN', serif;
      --shadow-card: 0 2px 10px rgba(57, 149, 163, 0.10);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-main);
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 15px;
      line-height: 1.6;
    }

    .container { max-width: 520px; margin: 0 auto; padding: 16px; }

    .page-header {
      background: var(--color-theme);
      padding: 20px 24px 16px;
      text-align: center;
      border-bottom: 2px solid var(--color-border);
    }
    .page-header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--color-accent2);
    }
    .event-date { font-size: 1.4rem; font-weight: 700; margin-top: 4px; }
    .deadline-badge {
      display: inline-block;
      background: var(--color-accent1);
      border: 1px solid #e6d900;
      padding: 3px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-top: 8px;
      color: #5a5200;
    }

    .card {
      background: var(--color-white);
      border-radius: var(--radius-card);
      padding: 18px;
      box-shadow: var(--shadow-card);
      margin-bottom: 16px;
      border: 1px solid var(--color-border);
    }
    .card-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-muted);
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 6px;
    }

    .bubbles { display: flex; flex-direction: column; gap: 10px; }
    .bubble { display: flex; align-items: flex-start; gap: 10px; }
    .bubble-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--color-accent2);
      color: var(--color-white);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 600;
      flex-shrink: 0;
    }
    .bubble-body {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-bubble);
      padding: 8px 12px;
      flex: 1;
    }
    .bubble-name { font-size: 0.72rem; color: var(--color-muted); margin-bottom: 2px; }
    .bubble-text { font-size: 0.9rem; }
    .bubble-indicator { margin-left: 6px; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--color-muted);
      margin-bottom: 5px;
    }
    .field input[type="text"],
    .field input[type="date"] {
      width: 100%;
      padding: 9px 13px;
      border: 1.5px solid var(--color-border);
      border-radius: 8px;
      font-family: var(--font-main);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      background: var(--color-white);
    }
    .field input:focus { border-color: var(--color-accent2); }

    .radio-group { display: flex; gap: 10px; }
    .radio-btn {
      flex: 1;
      padding: 10px;
      border: 1.5px solid var(--color-border);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      font-family: var(--font-main);
      font-size: 0.9rem;
      transition: all 0.15s;
      background: var(--color-white);
      user-select: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .radio-btn.selected {
      border-color: var(--color-accent2);
      background: var(--color-theme);
      color: var(--color-accent2);
      font-weight: 600;
    }

    .time-row { display: flex; align-items: center; gap: 8px; }
    .time-row input[type="text"] {
      width: 90px;
      padding: 9px;
      text-align: center;
      border: 1.5px solid var(--color-border);
      border-radius: 8px;
      font-family: var(--font-main);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .time-row input[type="text"]:focus { border-color: var(--color-accent2); }
    .time-row .sep { color: var(--color-muted); font-size: 0.9rem; }

    .forecast {
      border-radius: 10px;
      padding: 10px 14px;
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
    }
    .forecast.green  { background: #f0fdf4; border: 1.5px solid #86efac; }
    .forecast.yellow { background: #fffbeb; border: 1.5px solid #fcd34d; }
    .forecast.red    { background: #fef2f2; border: 1.5px solid #fca5a5; }
    .forecast-icon { font-size: 1.3rem; flex-shrink: 0; }
    .forecast-text { font-size: 0.84rem; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--color-accent2);
      color: var(--color-white);
      border: none;
      border-radius: var(--radius-btn);
      font-family: var(--font-main);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.15s;
      margin-top: 10px;
    }
    .btn-primary:hover    { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      padding: 11px;
      background: var(--color-white);
      color: var(--color-accent2);
      border: 1.5px solid var(--color-accent2);
      border-radius: var(--radius-btn);
      font-family: var(--font-main);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.15s;
      margin-top: 8px;
    }
    .btn-secondary:hover { background: var(--color-theme); }

    .admin-section {
      background: var(--color-white);
      border-radius: var(--radius-card);
      padding: 18px;
      box-shadow: var(--shadow-card);
      margin-bottom: 16px;
      border-top: 3px solid var(--color-accent2);
      border-left: 1px solid var(--color-border);
      border-right: 1px solid var(--color-border);
      border-bottom: 1px solid var(--color-border);
    }
    .admin-badge {
      display: inline-block;
      background: var(--color-theme);
      color: var(--color-accent2);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
      letter-spacing: 0.06em;
    }

    .schedule-list {
      margin-top: 12px;
      background: var(--color-bg);
      border-radius: 10px;
      padding: 12px;
      font-size: 0.84rem;
      line-height: 2;
    }
    .schedule-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid var(--color-border);
    }
    .schedule-row:last-child { border-bottom: none; }
    .status-ok   { color: #16a34a; font-weight: 600; }
    .status-warn { color: #b45309; font-weight: 600; }

    .login-row { display: flex; gap: 8px; margin-top: 8px; }
    .login-row input[type="password"] {
      flex: 1;
      padding: 9px 13px;
      border: 1.5px solid var(--color-border);
      border-radius: 8px;
      font-family: var(--font-main);
      font-size: 0.95rem;
      outline: none;
    }
    .login-row input[type="password"]:focus { border-color: var(--color-accent2); }
    .login-row button {
      padding: 9px 18px;
      background: var(--color-accent2);
      color: var(--color-white);
      border: none;
      border-radius: 8px;
      font-family: var(--font-main);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    .settings-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    .settings-row .field { margin-bottom: 0; flex: 1; min-width: 120px; }

    .out-of-period {
      text-align: center;
      padding: 40px 20px;
      color: var(--color-muted);
      font-size: 0.95rem;
      line-height: 2.2;
    }
    .out-of-period .icon {
      font-size: 1.8rem;
      display: block;
      margin-bottom: 10px;
      color: var(--color-accent2);
    }

    .hidden { display: none !important; }
    .text-muted { color: var(--color-muted); font-size: 0.82rem; }
    .mt-8 { margin-top: 8px; }
    .count-badge {
      display: inline-block;
      background: var(--color-accent1);
      border: 1px solid #e6d900;
      color: #5a5200;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 1px 8px;
      border-radius: 10px;
      margin-left: 6px;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>CIA 夜グルコン</h1>
    <div class="event-date" id="eventDateDisplay">—</div>
    <div class="deadline-badge" id="deadlineBadge">受付中</div>
  </div>

  <div class="container">

    <div id="outOfPeriodMsg" class="out-of-period hidden">
      <span class="icon">&#x23F0;</span>
      現在、受付期間外です。<br>
      次回グルコンの3日前より入力できます。
    </div>

    <div id="memberLoginArea" class="hidden">
      <div class="card" style="max-width:360px;margin:0 auto;">
        <div class="card-title">入室パスワード</div>
        <p class="text-muted">パスワードを入力してください</p>
        <div class="login-row">
          <input type="password" id="memberPasswordInput" placeholder="パスワード"
            onkeydown="if(event.key==='Enter') memberLogin()">
          <button onclick="memberLogin()">入室</button>
        </div>
        <p class="text-muted mt-8" id="memberLoginError" style="color:#ef4444"></p>
      </div>
    </div>

    <div id="participantArea">

      <div class="card">
        <div class="card-title">参加者の希望（入力済み）<span class="count-badge" id="submissionCount">0</span></div>
        <div class="bubbles" id="bubblesContainer">
          <p class="text-muted">まだ入力がありません</p>
        </div>
      </div>

      <div class="card">
        <div class="card-title">希望を入力する</div>

        <div class="field">
          <label>お名前（ニックネームOK）</label>
          <input type="text" id="inputName" placeholder="例：まいちゃん">
        </div>

        <div class="field">
          <label>&#9312; 希望時間</label>
          <div class="radio-group">
            <button class="radio-btn" id="btn10" type="button" onclick="selectDuration(10)">10分</button>
            <button class="radio-btn" id="btn20" type="button" onclick="selectDuration(20)">20分</button>
          </div>
        </div>

        <div class="field">
          <label>&#9313; 参加希望の時間帯</label>
          <div class="time-row">
            <input type="text" id="inputTimeStart" placeholder="21:00" oninput="onFormInput()">
            <span class="sep">〜</span>
            <input type="text" id="inputTimeEnd" placeholder="23:00" oninput="onFormInput()">
          </div>
        </div>

        <div class="forecast hidden" id="forecastArea">
          <div class="forecast-icon" id="forecastIcon"></div>
          <div class="forecast-text" id="forecastText"></div>
        </div>

        <button class="btn-primary" id="submitBtn" onclick="submitEntry()" disabled>送信する</button>
      </div>

    </div>

    <div class="admin-section">
      <div class="card-title">管理者</div>

      <div id="adminLoginForm">
        <p class="text-muted">パスワードを入力してください</p>
        <div class="login-row">
          <input type="password" id="adminPasswordInput" placeholder="パスワード"
            onkeydown="if(event.key==='Enter') adminLogin()">
          <button onclick="adminLogin()">ログイン</button>
        </div>
        <p class="text-muted mt-8" id="adminLoginError" style="color:#ef4444"></p>
      </div>

      <div id="adminPanel" class="hidden">
        <div class="admin-badge">管理者メニュー</div>

        <div style="margin-bottom:20px">
          <div class="card-title">グルコン設定</div>
          <div class="settings-row">
            <div class="field">
              <label>開催日</label>
              <input type="date" id="settingDate">
            </div>
            <div class="field">
              <label>開始時間</label>
              <input type="text" id="settingStartTime" placeholder="21:00">
            </div>
          </div>
          <button class="btn-secondary" onclick="saveEventSettings()">設定を保存</button>
          <p class="text-muted mt-8" id="settingSaved"></p>
        </div>

        <div style="margin-bottom:20px">
          <div class="card-title">参加者一覧<span class="count-badge" id="adminCount">0</span></div>
          <div id="adminSubmissionList" class="text-muted">（なし）</div>
        </div>

        <button class="btn-primary" onclick="generateSchedule()">スケジュール生成</button>
        <div id="scheduleResult" class="hidden">
          <div class="schedule-list" id="scheduleList"></div>
          <button class="btn-secondary" onclick="copySchedule()">スケジュールをコピー</button>
        </div>

        <button class="btn-secondary" style="margin-top:20px" onclick="adminLogout()">ログアウト</button>
      </div>

    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <script>
    const ADMIN_PASSWORD  = 'cia0000'; // 管理者パスワード
    const MEMBER_PASSWORD = 'cia';     // 参加者パスワード（生徒さん用）

    // ══════════════════════════════════════════
    // 時刻ユーティリティ
    // ══════════════════════════════════════════

    // "21:00" → 1260, "25:30" → 1530（日本の深夜表記対応）
    function timeToMin(str) {
      if (!str || !str.includes(':')) return NaN;
      const [h, m] = str.trim().split(':').map(Number);
      if (isNaN(h) || isNaN(m) || h < 0 || m < 0 || m >= 60) return NaN;
      return h * 60 + m;
    }

    // 1260 → "21:00", 1530 → "25:30"
    function minToTime(min) {
      const h = Math.floor(min / 60);
      const m = min % 60;
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

    // XSS 対策
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ══════════════════════════════════════════
    // EDF スケジュール生成（コアアルゴリズム）
    // ══════════════════════════════════════════
    // entries: [{ name, duration, timeStart, timeEnd }, ...]
    // startTimeStr: "21:00"
    // 戻り値: [{ index, name, duration, slotStart, slotEnd, deadline, status, overflowMin }, ...]
    function calcEDF(entries, startTimeStr) {
      if (!entries || entries.length === 0) return [];
      const start = timeToMin(startTimeStr || '21:00');
      if (isNaN(start)) return [];

      // EDF: 希望終了時刻（deadline）が早い順にソート
      // 同じ deadline の場合は entries の元の順序（提出順）が維持される（安定ソート）
      const sorted = [...entries].sort((a, b) => {
        const da = timeToMin(a.timeEnd);
        const db = timeToMin(b.timeEnd);
        if (isNaN(da) && isNaN(db)) return 0;
        if (isNaN(da)) return 1;
        if (isNaN(db)) return -1;
        return da - db;
      });

      let cursor = start;
      return sorted.map((entry, i) => {
        const slotStart   = cursor;
        const slotEnd     = cursor + Number(entry.duration);
        const deadline    = timeToMin(entry.timeEnd);
        const overflowMin = isNaN(deadline) ? 0 : Math.max(0, slotEnd - deadline);
        const status      = overflowMin === 0 ? 'ok' : 'warn';
        cursor = slotEnd;
        return { index: i + 1, name: entry.name, duration: Number(entry.duration),
                 slotStart, slotEnd, deadline, status, overflowMin };
      });
    }

    // 丸付き数字（①〜⑳）
    const CIRCLE_NUMS = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩',
                         '⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];

    // ══════════════════════════════════════════
    // Firebase 初期化
    // ══════════════════════════════════════════
    const firebaseConfig = {
      apiKey: "AIzaSyACIJxgyGjbtZwCiUymFcTdf8OOOWmXf2M",
      authDomain: "cia-gurucon-scheduler.firebaseapp.com",
      databaseURL: "https://cia-gurucon-scheduler-default-rtdb.firebaseio.com",
      projectId: "cia-gurucon-scheduler",
      storageBucket: "cia-gurucon-scheduler.firebasestorage.app",
      messagingSenderId: "960498403498",
      appId: "1:960498403498:web:863f613ed20cea7d5ea8d3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ══════════════════════════════════════════
    // アプリ状態
    // ══════════════════════════════════════════
    let currentEvent = null;   // { date, startTime, openDate, deadline }
    let submissions  = {};     // { [id]: { name, duration, timeStart, timeEnd, submittedAt } }

    // ══════════════════════════════════════════
    // イベントデータ読み込み・ヘッダー更新
    // ══════════════════════════════════════════
    const DOW_JA = ['日','月','火','水','木','金','土'];

    // "2026-05-26" → { month:5, day:26, dow:"火" } または null
    function parseDateStr(dateStr) {
      if (!dateStr) return null;
      const d = new Date(dateStr + 'T00:00:00');
      if (isNaN(d.getTime())) return null;
      return { month: d.getMonth() + 1, day: d.getDate(), dow: DOW_JA[d.getDay()] };
    }

    // "2026-05-26", "21:00" → "5/26(火) 21:00〜"
    function formatEventTitle(dateStr, startTime) {
      const p = parseDateStr(dateStr);
      if (!p) return '—';
      return `${p.month}/${p.day}(${p.dow}) ${startTime || ''}〜`;
    }

    // "2026-05-25T23:59" → "5/25(月) 23:59まで"
    function formatDeadlineBadge(deadlineStr) {
      if (!deadlineStr) return '受付中';
      const sep = deadlineStr.includes('T') ? 'T' : ' ';
      const [datePart, timePart] = deadlineStr.split(sep);
      const p = parseDateStr(datePart);
      if (!p) return '受付中';
      return `${p.month}/${p.day}(${p.dow}) ${timePart}まで`;
    }

    // Firebase からイベント情報をリアルタイム購読
    db.ref('/cia-gurucon/event').on('value', snap => {
      currentEvent = snap.val() || null;
      updateHeader();
      checkAccessPeriod();
      renderBubbles();
    });

    function updateHeader() {
      const dateEl  = document.getElementById('eventDateDisplay');
      const badgeEl = document.getElementById('deadlineBadge');
      if (currentEvent && currentEvent.date) {
        dateEl.textContent  = formatEventTitle(currentEvent.date, currentEvent.startTime);
        badgeEl.textContent = formatDeadlineBadge(currentEvent.deadline);
        if (isAdminLoggedIn()) {
          const di = document.getElementById('settingDate');
          const ti = document.getElementById('settingStartTime');
          if (di && !di.value) di.value = currentEvent.date || '';
          if (ti && !ti.value) ti.value = currentEvent.startTime || '';
        }
      } else {
        dateEl.textContent  = '—';
        badgeEl.textContent = '設定待ち';
      }
    }

    // ══════════════════════════════════════════
    // 参加者認証
    // ══════════════════════════════════════════
    function isMemberLoggedIn() {
      return localStorage.getItem('cia_member') === 'true';
    }

    function memberLogin() {
      const input = document.getElementById('memberPasswordInput').value;
      const errEl = document.getElementById('memberLoginError');
      if (input === MEMBER_PASSWORD) {
        localStorage.setItem('cia_member', 'true');
        errEl.textContent = '';
        checkAccessPeriod();
      } else {
        errEl.textContent = 'パスワードが違います';
      }
      document.getElementById('memberPasswordInput').value = '';
    }

    // ══════════════════════════════════════════
    // Task 5: 管理者認証
    // ══════════════════════════════════════════
    function isAdminLoggedIn() {
      return localStorage.getItem('cia_admin') === 'true';
    }

    function adminLogin() {
      const input = document.getElementById('adminPasswordInput').value;
      const errEl = document.getElementById('adminLoginError');
      if (input === ADMIN_PASSWORD) {
        localStorage.setItem('cia_admin', 'true');
        document.getElementById('adminLoginForm').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        errEl.textContent = '';
        if (currentEvent) {
          const di = document.getElementById('settingDate');
          const ti = document.getElementById('settingStartTime');
          if (di) di.value = currentEvent.date || '';
          if (ti) ti.value = currentEvent.startTime || '';
        }
        checkAccessPeriod();
        renderAdminSubmissionList();
      } else {
        errEl.textContent = 'パスワードが違います';
      }
      document.getElementById('adminPasswordInput').value = '';
    }

    function adminLogout() {
      localStorage.removeItem('cia_admin');
      document.getElementById('adminLoginForm').classList.remove('hidden');
      document.getElementById('adminPanel').classList.add('hidden');
      checkAccessPeriod();
    }

    // ══════════════════════════════════════════
    // Task 6: アクセス期間制御
    // ══════════════════════════════════════════
    function checkAccessPeriod() {
      const participantArea = document.getElementById('participantArea');
      const outOfPeriodMsg  = document.getElementById('outOfPeriodMsg');
      const memberLoginArea = document.getElementById('memberLoginArea');

      function showParticipant()  { participantArea.classList.remove('hidden'); outOfPeriodMsg.classList.add('hidden'); memberLoginArea.classList.add('hidden'); }
      function showOutOfPeriod()  { participantArea.classList.add('hidden'); outOfPeriodMsg.classList.remove('hidden'); memberLoginArea.classList.add('hidden'); }
      function showMemberLogin()  { participantArea.classList.add('hidden'); outOfPeriodMsg.classList.add('hidden'); memberLoginArea.classList.remove('hidden'); }

      if (isAdminLoggedIn()) { showParticipant(); return; }

      if (!currentEvent || !currentEvent.date) { showOutOfPeriod(); return; }

      const now       = new Date();
      const eventDate = new Date(currentEvent.date + 'T00:00:00');
      const openDate  = new Date(eventDate);
      openDate.setDate(openDate.getDate() - 3);
      const deadline  = new Date(eventDate);
      deadline.setDate(deadline.getDate() - 1);
      deadline.setHours(23, 59, 59, 999);
      const inPeriod = now >= openDate && now <= deadline;

      if (!inPeriod)          { showOutOfPeriod(); return; }
      if (isMemberLoggedIn()) { showParticipant(); return; }
      showMemberLogin();
    }

    // ══════════════════════════════════════════
    // Task 7: 参加者吹き出しのリアルタイム表示
    // ══════════════════════════════════════════
    const AVATAR_COLORS = [
      '#3995a3','#5b8dd9','#9b72cf','#d95b8d',
      '#d9885b','#8dd95b','#5bd9c4','#8589d9'
    ];

    function getAvatarColor(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
      }
      return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
    }

    db.ref('/cia-gurucon/submissions').on('value', snap => {
      submissions = snap.val() || {};
      renderBubbles();
      updateForecast();
      renderAdminSubmissionList();
    });

    function renderBubbles() {
      const container = document.getElementById('bubblesContainer');
      const countEl   = document.getElementById('submissionCount');
      const entries   = Object.values(submissions)
        .sort((a, b) => a.submittedAt - b.submittedAt);

      countEl.textContent = entries.length;

      // コンテナをクリア
      while (container.firstChild) container.removeChild(container.firstChild);

      if (entries.length === 0) {
        const p = document.createElement('p');
        p.className = 'text-muted';
        p.textContent = 'まだ入力がありません';
        container.appendChild(p);
        return;
      }

      const startTime    = currentEvent ? (currentEvent.startTime || '21:00') : '21:00';
      const tempSchedule = calcEDF(entries, startTime);

      entries.forEach(entry => {
        const row       = tempSchedule.find(r => r.name === entry.name);
        const indicator = row ? (row.status === 'ok' ? '🟢' : '🔴') : '🟡';

        // .bubble
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bubble';

        // .bubble-avatar
        const avatarDiv = document.createElement('div');
        avatarDiv.className = 'bubble-avatar';
        avatarDiv.style.background = getAvatarColor(entry.name);
        avatarDiv.textContent = entry.name.charAt(0);

        // .bubble-body
        const bodyDiv = document.createElement('div');
        bodyDiv.className = 'bubble-body';

        const nameDiv = document.createElement('div');
        nameDiv.className = 'bubble-name';
        nameDiv.textContent = entry.name;

        const textDiv = document.createElement('div');
        textDiv.className = 'bubble-text';
        textDiv.textContent = '①' + Number(entry.duration) + '分　②' +
          entry.timeStart + '〜' + entry.timeEnd + ' ';

        const indSpan = document.createElement('span');
        indSpan.className = 'bubble-indicator';
        indSpan.textContent = indicator;
        textDiv.appendChild(indSpan);

        bodyDiv.appendChild(nameDiv);
        bodyDiv.appendChild(textDiv);
        bubbleDiv.appendChild(avatarDiv);
        bubbleDiv.appendChild(bodyDiv);
        container.appendChild(bubbleDiv);
      });
    }

    // ══════════════════════════════════════════
    // Task 8: 参加者フォームと 🟢🔴 リアルタイム判定
    // ══════════════════════════════════════════
    let selectedDuration = 0;

    function selectDuration(min) {
      selectedDuration = min;
      document.getElementById('btn10').classList.toggle('selected', min === 10);
      document.getElementById('btn20').classList.toggle('selected', min === 20);
      onFormInput();
    }

    function validateForm() {
      const name  = document.getElementById('inputName').value.trim();
      const start = document.getElementById('inputTimeStart').value.trim();
      const end   = document.getElementById('inputTimeEnd').value.trim();
      return name.length > 0
        && selectedDuration > 0
        && !isNaN(timeToMin(start))
        && !isNaN(timeToMin(end))
        && timeToMin(start) < timeToMin(end);
    }

    function onFormInput() {
      document.getElementById('submitBtn').disabled = !validateForm();
      updateForecast();
    }

    function updateForecast() {
      const forecastArea = document.getElementById('forecastArea');
      const forecastIcon = document.getElementById('forecastIcon');
      const forecastText = document.getElementById('forecastText');

      const name  = document.getElementById('inputName').value.trim();
      const start = document.getElementById('inputTimeStart').value.trim();
      const end   = document.getElementById('inputTimeEnd').value.trim();

      if (!name || selectedDuration === 0 || isNaN(timeToMin(start)) || isNaN(timeToMin(end))) {
        forecastArea.className = 'forecast hidden';
        return;
      }

      const currentEntry = { name, duration: selectedDuration, timeStart: start, timeEnd: end };
      const allEntries   = [...Object.values(submissions), currentEntry];
      const eventStart   = currentEvent ? (currentEvent.startTime || '21:00') : '21:00';
      const schedule     = calcEDF(allEntries, eventStart);
      // 末尾から探す（同名が既存の場合、入力中の自分は末尾に追加される）
      const mine         = [...schedule].reverse().find(r => r.name === name);

      if (!mine) { forecastArea.className = 'forecast hidden'; return; }

      // DOM で組み立て（textContent のみ使用）
      while (forecastText.firstChild) forecastText.removeChild(forecastText.firstChild);

      if (mine.status === 'ok') {
        forecastArea.className = 'forecast green';
        forecastIcon.textContent = '🟢';
        const strong = document.createElement('strong');
        strong.textContent = '希望通りに入れそうです';
        const span = document.createElement('span');
        span.style.color = '#555';
        span.style.display = 'block';
        span.textContent = minToTime(mine.slotStart) + '〜' + minToTime(mine.slotEnd) + ' に割り当て予定';
        forecastText.appendChild(strong);
        forecastText.appendChild(span);
      } else {
        forecastArea.className = 'forecast red';
        forecastIcon.textContent = '🔴';
        const strong = document.createElement('strong');
        strong.textContent = '希望時間を超える可能性があります';
        const span = document.createElement('span');
        span.style.color = '#555';
        span.style.display = 'block';
        span.textContent = '現時点で ' + mine.overflowMin + '分オーバーの見込み';
        forecastText.appendChild(strong);
        forecastText.appendChild(span);
      }
    }

    document.getElementById('inputName').addEventListener('input', onFormInput);

    // ══════════════════════════════════════════
    // Task 9: フォーム送信（Firebase 書き込み）
    // ══════════════════════════════════════════
    async function submitEntry() {
      if (!validateForm()) return;

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled    = true;
      submitBtn.textContent = '送信中...';

      const entry = {
        name:        document.getElementById('inputName').value.trim(),
        duration:    selectedDuration,
        timeStart:   document.getElementById('inputTimeStart').value.trim(),
        timeEnd:     document.getElementById('inputTimeEnd').value.trim(),
        submittedAt: Date.now()
      };

      try {
        await db.ref('/cia-gurucon/submissions').push().set(entry);

        document.getElementById('inputName').value      = '';
        document.getElementById('inputTimeStart').value = '';
        document.getElementById('inputTimeEnd').value   = '';
        selectedDuration = 0;
        document.getElementById('btn10').classList.remove('selected');
        document.getElementById('btn20').classList.remove('selected');
        document.getElementById('forecastArea').className = 'forecast hidden';

        submitBtn.textContent = '送信しました！';
        setTimeout(() => {
          submitBtn.textContent = '送信する';
          submitBtn.disabled    = true;
        }, 2000);

      } catch (err) {
        console.error('submitEntry error:', err);
        alert('送信に失敗しました。もう一度お試しください。');
        submitBtn.disabled    = false;
        submitBtn.textContent = '送信する';
      }
    }

    // ══════════════════════════════════════════
    // Task 10: 管理者パネル - グルコン設定・参加者一覧
    // ══════════════════════════════════════════
    async function saveEventSettings() {
      const dateVal = document.getElementById('settingDate').value;
      const timeVal = document.getElementById('settingStartTime').value.trim();
      const savedEl = document.getElementById('settingSaved');

      if (!dateVal || !timeVal) {
        savedEl.textContent = '日付と開始時間を入力してください';
        savedEl.style.color = '#ef4444';
        return;
      }

      const eventDate    = new Date(dateVal + 'T00:00:00');
      const openDate     = new Date(eventDate);
      openDate.setDate(openDate.getDate() - 3);
      const openDateStr  = openDate.toISOString().slice(0, 10);
      const deadlineDate = new Date(eventDate);
      deadlineDate.setDate(deadlineDate.getDate() - 1);
      const deadlineStr  = deadlineDate.toISOString().slice(0, 10) + 'T23:59';

      try {
        await db.ref('/cia-gurucon/event').set({
          date: dateVal, startTime: timeVal,
          openDate: openDateStr, deadline: deadlineStr
        });
        savedEl.textContent =
          '保存しました（開放：' + openDateStr + '　締切：' + deadlineStr.replace('T', ' ') + '）';
        savedEl.style.color = '#16a34a';
      } catch (err) {
        console.error('saveEventSettings error:', err);
        savedEl.textContent = '保存に失敗しました';
        savedEl.style.color = '#ef4444';
      }
    }

    function renderAdminSubmissionList() {
      const listEl  = document.getElementById('adminSubmissionList');
      const countEl = document.getElementById('adminCount');
      if (!listEl) return;

      const entries = Object.values(submissions)
        .sort((a, b) => a.submittedAt - b.submittedAt);
      countEl.textContent = entries.length;

      // コンテナをクリア
      while (listEl.firstChild) listEl.removeChild(listEl.firstChild);

      if (entries.length === 0) {
        const p = document.createElement('p');
        p.className = 'text-muted';
        p.textContent = '（なし）';
        listEl.appendChild(p);
        return;
      }

      const totalMin = entries.reduce((sum, e) => sum + Number(e.duration), 0);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;

      // テーブルを DOM で構築（ユーザーデータは textContent で設定）
      const table = document.createElement('table');
      table.style.cssText = 'width:100%;border-collapse:collapse;font-size:0.83rem';

      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      headerRow.style.borderBottom = '2px solid var(--color-border)';
      ['#', '名前', '時間', '希望帯'].forEach((text, i) => {
        const th = document.createElement('th');
        th.textContent = text;
        th.style.cssText = 'text-align:' + (i === 2 ? 'center' : 'left') +
          ';padding:4px 6px;color:var(--color-muted);font-weight:600';
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      entries.forEach((e, i) => {
        const tr = document.createElement('tr');
        tr.style.borderBottom = '1px solid var(--color-border)';

        const tdNum  = document.createElement('td');
        tdNum.textContent = i + 1;
        tdNum.style.cssText = 'padding:4px 6px;color:var(--color-muted)';

        const tdName = document.createElement('td');
        tdName.textContent = e.name;
        tdName.style.padding = '4px 6px';

        const tdDur  = document.createElement('td');
        tdDur.textContent = Number(e.duration) + '分';
        tdDur.style.cssText = 'padding:4px 6px;text-align:center';

        const tdTime = document.createElement('td');
        tdTime.textContent = e.timeStart + '〜' + e.timeEnd;
        tdTime.style.padding = '4px 6px';

        tr.appendChild(tdNum);
        tr.appendChild(tdName);
        tr.appendChild(tdDur);
        tr.appendChild(tdTime);
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);

      const totalP = document.createElement('p');
      totalP.className = 'text-muted mt-8';
      totalP.textContent = '合計 ' + totalMin + '分（' + h + '時間' + m + '分）';

      listEl.appendChild(table);
      listEl.appendChild(totalP);
    }

    // ══════════════════════════════════════════
    // Task 11: スケジュール生成・表示と LINE コピー
    // ══════════════════════════════════════════
    function generateSchedule() {
      const entries    = Object.values(submissions).sort((a, b) => a.submittedAt - b.submittedAt);
      const eventStart = currentEvent ? (currentEvent.startTime || '21:00') : '21:00';
      const schedule   = calcEDF(entries, eventStart);
      const resultEl   = document.getElementById('scheduleResult');
      const listEl     = document.getElementById('scheduleList');

      // コンテナをクリア
      while (listEl.firstChild) listEl.removeChild(listEl.firstChild);

      if (schedule.length === 0) {
        const p = document.createElement('p');
        p.className = 'text-muted';
        p.textContent = '参加者がまだいません';
        listEl.appendChild(p);
        resultEl.classList.remove('hidden');
        return;
      }

      schedule.forEach((row, i) => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'schedule-row';

        const leftSpan = document.createElement('span');
        leftSpan.textContent = (CIRCLE_NUMS[i] || '(' + (i + 1) + ')') + ' ' +
          minToTime(row.slotStart) + '〜' + minToTime(row.slotEnd) +
          '（' + row.duration + '分）' + row.name;

        const statusSpan = document.createElement('span');
        if (row.status === 'ok') {
          statusSpan.className = 'status-ok';
          statusSpan.textContent = '✓';
        } else {
          statusSpan.className = 'status-warn';
          statusSpan.textContent = '⚠ ' + row.overflowMin + '分オーバー';
        }

        rowDiv.appendChild(leftSpan);
        rowDiv.appendChild(statusSpan);
        listEl.appendChild(rowDiv);
      });

      resultEl.classList.remove('hidden');
    }

    function copySchedule() {
      const entries    = Object.values(submissions).sort((a, b) => a.submittedAt - b.submittedAt);
      const eventStart = currentEvent ? (currentEvent.startTime || '21:00') : '21:00';
      const schedule   = calcEDF(entries, eventStart);

      if (!currentEvent || !currentEvent.date) {
        alert('グルコン日程が設定されていません');
        return;
      }

      const d      = new Date(currentEvent.date + 'T00:00:00');
      const wds    = ['日','月','火','水','木','金','土'];
      const dateStr = (d.getMonth() + 1) + '/' + d.getDate() + '(' + wds[d.getDay()] + ')';

      const lines = [
        '夜グルコン',
        dateStr + ' ' + currentEvent.startTime + '〜',
        '',
        '【マンスリースケジュール決定のお知らせ】',
        '',
        ...schedule.map((row, i) => {
          const num    = CIRCLE_NUMS[i] || '(' + (i + 1) + ')';
          const status = row.status === 'ok' ? '✅' : '⚠️ ' + row.overflowMin + '分オーバー';
          return num + ' ' + minToTime(row.slotStart) + '〜' + minToTime(row.slotEnd) +
            '（' + row.duration + '分）' + row.name + '　' + status;
        }),
        '',
        '上記のスケジュールがご希望と違っていましたら、',
        'お気軽にお知らせください😊',
        'よろしくお願いいたします。'
      ];

      const text = lines.join('\n');

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => flashCopyBtn());
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity  = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        flashCopyBtn();
      }
    }

    function flashCopyBtn() {
      const btn = document.querySelector('[onclick="copySchedule()"]');
      if (!btn) return;
      const orig = btn.textContent;
      btn.textContent = 'コピーしました！';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    }

    // ══════════════════════════════════════════
    // ページ読み込み時のセッション復元
    // ══════════════════════════════════════════
    (function initSession() {
      if (isAdminLoggedIn()) {
        document.getElementById('adminLoginForm').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
      }
      // checkAccessPeriod は Firebase イベントデータ取得後に呼ばれる
    })();
  </script>
</body>
</html>
